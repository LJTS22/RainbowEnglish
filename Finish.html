<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finish</title>   
    <link rel="stylesheet" href="../css/Finish.css">
</head>
<body>
    <header>
        <div class="container">
            <p class="pLevels">What color is this?</p>
        <div class="circulo">
        </div>
        </div>

        </header>
        <div class="cuadritos">
            <div class="containerRojo">
                <button class="colores">Blue</button>
            </div>
            <div class="containerAzul">   
                <button class="colores">Yellow</button>
            </div>
        </div>
         <div class="containerMorado">
            <button id="abrirModalBtn" class="botonM">Finish</button> 
        </div>
        <a href="../index.html">
            <svg 
            xmlns="http://www.w3.org/2000/svg"
            background-color="rgb(0, 0, 0)"; 
            width="40" 
            height="40" 
            viewBox="0 0 24 24" s
            fill="none" 
            stroke="currentColor" 
            stroke-width="2" 
            stroke-linecap="round" 
            stroke-linejoin="round" 
            class="lucide lucide-house-icon lucide-house">
            <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
            <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        </a>


<!-- NUEVO: Estructura del modal -->
<div id="miModal" class="modal">
    <div class="modal-contenido">
        <span class="cerrar-modal">&times;</span>
        <h2 id="tituloModal">Your answer is correct! 😀</h2>
        <p id="mensajeModal">Good job, keep it up!.</p>
    </div>
</div>    
<script>
    // ===============================
    // 1. OBTENER ELEMENTOS DEL DOM
    // ===============================
    const modal = document.getElementById("miModal");
    const btnCerrar = document.getElementsByClassName("cerrar-modal")[0];
    const botones = document.querySelectorAll(".colores");

    const tituloModal = document.getElementById("tituloModal");
    const mensajeModal = document.getElementById("mensajeModal");

    const btnFinish = document.getElementById("abrirModalBtn");

    // ===============================
    // 2. VARIABLE DE CONTROL
    // ===============================
    let respuestaEsCorrecta = false;

    // Definimos cuál es la respuesta correcta
    const respuestaCorrecta = "Blue";

    // ===============================
    // 3. VALIDAR RESPUESTAS
    // ===============================
    botones.forEach(boton => {
        boton.addEventListener("click", function() {
            const respuestaUsuario = boton.textContent;

            if (respuestaUsuario === respuestaCorrecta) {
                // ✅ RESPUESTA CORRECTA
                tituloModal.textContent = "Correct! 😀";
                mensajeModal.textContent = "Good job, you can continue!";
                respuestaEsCorrecta = true;

                modal.style.display = "block";
            } else {
                // ❌ RESPUESTA INCORRECTA
                tituloModal.textContent = "Incorrect ❌";
                mensajeModal.textContent = "Try again before continuing.";
                respuestaEsCorrecta = false;

                modal.style.display = "block";
            }
        });
    });

    // ===============================
    // 4. BOTÓN FINISH
    // ===============================
    btnFinish.onclick = function() {
        if (respuestaEsCorrecta) {
            tituloModal.textContent = "Great! 🎉";
            mensajeModal.textContent = "You passed this level!";
        } else {
            tituloModal.textContent = "Wait! ❌";
            mensajeModal.textContent = "You must choose the correct answer first.";
        }

        modal.style.display = "block";
    }

    // ===============================
    // 5. CERRAR MODAL
    // ===============================

    // Cerrar con la X
    btnCerrar.onclick = function() {
        modal.style.display = "none";
    }

    // Cerrar haciendo clic fuera
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }

    // Cerrar con ESC
    document.onkeydown = function(event) {
        if (event.key === "Escape" && modal.style.display === "block") {
            modal.style.display = "none";
        }
    }
</script> 
</body>
</html>
