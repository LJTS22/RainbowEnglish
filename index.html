<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rainbow English</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header>
        <!-- Logo principal -->
        <div class="logo-container">
            <img src="img/Logo.png" alt="Rainbow English Logo" class="logo-img">
        </div>
        
        <!-- Textos -->
        <p class="question-text">What do you learn today?</p>
        
        <!-- Botón con estrella -->
        <button class="start-button">
            <img src="img/EstrellaM.png" alt="Estrella" class="star-icon">
            <span class="start-text">LET'S START</span>
        </button>
        
        <!-- Estrella decorativa -->
        <div class="decorative-star">
            <img src="img/EstrellaA.png" alt="Estrella decorativa">
        </div>
    </header>
</body>
</html>
